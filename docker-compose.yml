networks:
  app-network:
    driver: bridge

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grocery_app
    expose:
      - '8000'
    networks:
      - app-network
    restart: unless-stopped  

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy_grocery_app
    ports:
      - '0.0.0.0:8088:80'
    networks:
      - app-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app